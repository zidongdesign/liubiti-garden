<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>画廊 — 刘鼻涕的思考花园 🐱</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e0e;
      color: #e8e4dc;
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    /* Header */
    header {
      padding: 40px 32px 24px;
      display: flex;
      align-items: baseline;
      gap: 20px;
      border-bottom: 1px solid #1e1e1e;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: #c8c4bc;
    }
    header h1 span {
      color: #666;
      font-size: 0.9rem;
      margin-left: 8px;
    }
    header nav a {
      color: #888;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    header nav a:hover { color: #c8c4bc; }

    /* Gallery grid */
    .gallery {
      padding: 32px;
      columns: 3 320px;
      column-gap: 16px;
    }

    @media (max-width: 700px) {
      .gallery { columns: 2 160px; padding: 16px; column-gap: 10px; }
      header { padding: 24px 16px 16px; }
    }
    @media (max-width: 420px) {
      .gallery { columns: 1; }
    }

    /* Each card */
    .card {
      break-inside: avoid;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      cursor: pointer;
      background: #1a1a1a;
    }

    .card img {
      width: 100%;
      display: block;
      transition: transform 0.5s ease, filter 0.4s ease;
      filter: brightness(0.92);
    }

    .card:hover img {
      transform: scale(1.04);
      filter: brightness(0.5);
    }

    /* Overlay */
    .card-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px 16px 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .card:hover .card-overlay {
      opacity: 1;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 400;
      color: #f0ece4;
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .card-date {
      font-size: 0.72rem;
      color: #aaa;
      letter-spacing: 0.05em;
    }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      max-width: 860px;
      width: 100%;
      display: flex;
      gap: 32px;
      align-items: flex-start;
    }

    @media (max-width: 640px) {
      .modal { flex-direction: column; gap: 20px; }
    }

    .modal-img {
      flex: 1 1 55%;
      min-width: 0;
    }
    .modal-img img {
      width: 100%;
      border-radius: 4px;
      display: block;
    }

    .modal-text {
      flex: 1 1 40%;
      min-width: 0;
      padding-top: 4px;
    }

    .modal-date {
      font-size: 0.75rem;
      color: #777;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 400;
      color: #e8e4dc;
      line-height: 1.45;
      margin-bottom: 16px;
    }

    .modal-subtitle {
      font-size: 0.82rem;
      color: #aaa;
      font-style: italic;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .modal-content p {
      font-size: 0.88rem;
      color: #c8c4bc;
      line-height: 1.75;
      margin-bottom: 10px;
    }

    .modal-close {
      position: fixed;
      top: 24px;
      right: 28px;
      font-size: 1.6rem;
      color: #888;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      transition: color 0.2s;
    }
    .modal-close:hover { color: #eee; }

    /* Nav arrow */
    .modal-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      color: #666;
      cursor: pointer;
      background: none;
      border: none;
      padding: 12px;
      transition: color 0.2s;
      user-select: none;
    }
    .modal-nav:hover { color: #ccc; }
    .modal-nav.prev { left: 12px; }
    .modal-nav.next { right: 12px; }

    /* Count badge */
    .count-badge {
      display: inline-block;
      background: #1e1e1e;
      color: #666;
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<header>
  <h1>画廊 <span class="count-badge" id="count-badge">…</span></h1>
  <nav>
    <a href="index.html">← 思考花园</a>
  </nav>
</header>

<div class="gallery" id="gallery"></div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <button class="modal-close" id="modal-close">✕</button>
  <button class="modal-nav prev" id="modal-prev">‹</button>
  <div class="modal">
    <div class="modal-img">
      <img id="modal-img" src="" alt="" />
    </div>
    <div class="modal-text">
      <div class="modal-date" id="modal-date"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-subtitle" id="modal-subtitle"></div>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>
  <button class="modal-nav next" id="modal-next">›</button>
</div>

<script>
  let allItems = [];
  let currentIndex = 0;

  async function load() {
    const resp = await fetch('thoughts.json?v=' + Date.now());
    const data = await resp.json();
    // Filter: only thoughts with images, exclude 'about'
    allItems = data.thoughts.filter(t => t.image && t.id !== 'about');
    render();
  }

  function render() {
    const gallery = document.getElementById('gallery');
    document.getElementById('count-badge').textContent = allItems.length + ' 幅';
    gallery.innerHTML = allItems.map((item, i) => `
      <div class="card" data-index="${i}">
        <img src="${item.image}?v=${Date.now()}" alt="${item.title || ''}" loading="lazy" />
        <div class="card-overlay">
          <div class="card-title">${item.title || ''}</div>
          <div class="card-date">${item.dateLabel || item.date || ''}</div>
        </div>
      </div>
    `).join('');

    gallery.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => openModal(parseInt(card.dataset.index)));
    });
  }

  function openModal(i) {
    currentIndex = i;
    const item = allItems[i];
    document.getElementById('modal-img').src = item.image + '?v=' + Date.now();
    document.getElementById('modal-date').textContent = item.dateLabel || item.date || '';
    document.getElementById('modal-title').textContent = item.title || '';
    document.getElementById('modal-subtitle').textContent = item.subtitle || '';

    // Render content
    const contentEl = document.getElementById('modal-content');
    if (Array.isArray(item.content)) {
      contentEl.innerHTML = item.content.map(c => {
        if (typeof c === 'string') return `<p>${c}</p>`;
        if (c.type === 'quote') return `<p style="border-left:2px solid #555;padding-left:12px;color:#aaa;font-style:italic">${c.text}</p>`;
        return '';
      }).join('');
    } else {
      contentEl.innerHTML = '';
    }

    document.getElementById('modal-backdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  function navigate(dir) {
    currentIndex = (currentIndex + dir + allItems.length) % allItems.length;
    openModal(currentIndex);
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-prev').addEventListener('click', () => navigate(-1));
  document.getElementById('modal-next').addEventListener('click', () => navigate(1));
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'ArrowLeft') navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
  });

  load();
</script>
</body>
</html>
