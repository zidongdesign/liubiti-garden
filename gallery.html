<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#fdfcfb" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1915" media="(prefers-color-scheme: dark)">
  <title>画廊 — 刘鼻涕的思考花园 🐱</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e8e4dc;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px) + 16px);
    }

    /* Header */
    .top-nav { display: none; }

    /* Tab Bar */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-around; align-items: center;
      height: calc(64px + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: rgba(10, 10, 10, 0.78);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      backdrop-filter: saturate(180%) blur(20px);
      border-top: 0.5px solid #1a1a1a;
    }
    .tab-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      text-decoration: none; color: #555; transition: color 0.2s;
      padding: 6px 12px; -webkit-tap-highlight-color: transparent;
    }
    .tab-item:hover { color: #999; }
    .tab-item.active { color: #999; }
    .tab-icon { width: 22px; height: 22px; stroke-linecap: round; stroke-linejoin: round; }
    .tab-label { font-size: 0.62rem; letter-spacing: 0.06em; font-weight: 400; }

    header {
      padding: 20px 24px 16px;
      text-align: center;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #999;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      padding: 3px;
    }

    .cell {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      cursor: pointer;
      background: #111;
    }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease, filter 0.3s ease;
    }

    .cell:hover img {
      transform: scale(1.06);
      filter: brightness(0.45);
    }

    .cell-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 12px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .cell:hover .cell-overlay {
      opacity: 1;
    }

    .cell-title {
      font-size: 0.78rem;
      color: #f0ece4;
      line-height: 1.35;
      letter-spacing: 0.01em;
    }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.94);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      max-width: 800px;
      width: 100%;
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }

    @media (max-width: 600px) {
      .modal { flex-direction: column; gap: 16px; }
    }

    .modal-img { flex: 1 1 55%; min-width: 0; }
    .modal-img img { width: 100%; border-radius: 2px; display: block; }

    .modal-text { flex: 1 1 40%; min-width: 0; padding-top: 4px; }
    .modal-date { font-size: 0.7rem; color: #666; letter-spacing: 0.08em; margin-bottom: 10px; text-transform: uppercase; }
    .modal-title { font-size: 1.15rem; font-weight: 400; color: #e8e4dc; line-height: 1.45; margin-bottom: 12px; }
    .modal-subtitle { font-size: 0.8rem; color: #999; font-style: italic; line-height: 1.5; margin-bottom: 14px; }
    .modal-content p { font-size: 0.85rem; color: #bbb; line-height: 1.75; margin-bottom: 8px; }

    .modal-close {
      position: fixed; top: 20px; right: 24px;
      font-size: 1.4rem; color: #666; cursor: pointer;
      background: none; border: none; line-height: 1; transition: color 0.2s;
    }
    .modal-close:hover { color: #ddd; }

    .modal-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      font-size: 2rem; color: #444; cursor: pointer;
      background: none; border: none; padding: 12px; transition: color 0.2s;
      user-select: none;
    }
    .modal-nav:hover { color: #bbb; }
    .modal-nav.prev { left: 8px; }
    .modal-nav.next { right: 8px; }
  </style>
</head>
<body>

<header>
  <h1>刘鼻涕的画</h1>
</header>

<div class="grid" id="grid"></div>

<!-- Tab Bar -->
<nav class="tab-bar">
    <a href="index.html" class="tab-item" aria-label="花园">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3L2 12h3v8h6v-5h2v5h6v-8h3L12 3z"/></svg>
        <span class="tab-label">花园</span>
    </a>
    <a href="gallery.html" class="tab-item active" aria-label="画廊">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span class="tab-label">画廊</span>
    </a>
    <a href="awareness.html" class="tab-item" aria-label="觉察">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <span class="tab-label">觉察</span>
    </a>
    <a href="about.html" class="tab-item" aria-label="关于">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="tab-label">关于</span>
    </a>
</nav>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <button class="modal-close" id="modal-close">✕</button>
  <button class="modal-nav prev" id="modal-prev">‹</button>
  <div class="modal">
    <div class="modal-img"><img id="modal-img" src="" alt="" /></div>
    <div class="modal-text">
      <div class="modal-date" id="modal-date"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-subtitle" id="modal-subtitle"></div>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>
  <button class="modal-nav next" id="modal-next">›</button>
</div>

<script>
  let items = [];
  let cur = 0;

  async function load() {
    const r = await fetch('thoughts.json?v=' + Date.now());
    const data = await r.json();
    items = data.thoughts.filter(t => t.image && t.id !== 'about');
    render();
  }

  function thumbUrl(img) {
    // images/foo.webp → images/thumbs/foo.webp
    if (!img) return '';
    return img.replace('images/', 'images/thumbs/').replace(/\.png$/, '.webp');
  }

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = items.map((item, i) => `
      <div class="cell" data-index="${i}">
        <img src="${thumbUrl(item.image)}" alt="${item.title || ''}" loading="lazy"
             onerror="this.src='${item.image}'" />
        <div class="cell-overlay">
          <div class="cell-title">${item.title || ''}</div>
        </div>
      </div>
    `).join('');
    grid.querySelectorAll('.cell').forEach(c => {
      c.addEventListener('click', () => open(parseInt(c.dataset.index)));
    });
  }

  function open(i) {
    cur = i;
    const t = items[i];
    document.getElementById('modal-img').src = t.image + '?v=' + Date.now();
    document.getElementById('modal-date').textContent = t.dateLabel || t.date || '';
    document.getElementById('modal-title').textContent = t.title || '';
    document.getElementById('modal-subtitle').textContent = t.subtitle || '';
    const c = document.getElementById('modal-content');
    if (Array.isArray(t.content)) {
      c.innerHTML = t.content.map(x => {
        if (typeof x === 'string') return `<p>${x}</p>`;
        if (x.type === 'quote') return `<p style="border-left:2px solid #444;padding-left:10px;color:#888;font-style:italic">${x.text}</p>`;
        return '';
      }).join('');
    } else { c.innerHTML = ''; }
    document.getElementById('modal-backdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    document.getElementById('modal-backdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  function nav(d) { cur = (cur + d + items.length) % items.length; open(cur); }

  document.getElementById('modal-close').onclick = close;
  document.getElementById('modal-prev').onclick = () => nav(-1);
  document.getElementById('modal-next').onclick = () => nav(1);
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-backdrop')) close();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') nav(-1);
    if (e.key === 'ArrowRight') nav(1);
  });

  load();
</script>
</body>
</html>
